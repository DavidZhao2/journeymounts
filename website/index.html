<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CJM Wiki (Simple)</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div class="logo">CJM</div>
        <div class="brandText">
          <div class="brandTitle">Cobblemon Journey Mounts</div>
          <div class="brandSub">Simple Wiki</div>
        </div>
      </div>

      <div class="searchBox">
        <input id="searchInput" type="search" placeholder="Search pages..." autocomplete="off" />
        <div class="muted small" id="searchHint">Type to filter the sidebar</div>
      </div>

      <nav id="nav" class="nav"></nav>

      <div class="sideFooter">
        <div class="muted small">Journey Mounts</div>
      </div>
    </aside>

    <main class="content">
      <header class="topbar">
        <button class="mobileBtn" id="mobileBtn" aria-label="Toggle menu">☰</button>
        <div class="crumbs">
          <span class="muted">Page:</span> <span id="crumbTitle">Home</span>
        </div>
        <div class="right">
          <span class="pill" id="pillStatus">Ready</span>
        </div>
      </header>

      <section class="card">
        <div id="page"></div>
      </section>

      <footer class="footer">
        <span class="muted small">© <span id="year"></span> CJM Wiki</span>
      </footer>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
